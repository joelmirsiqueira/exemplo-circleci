version: 2.1

orbs:
  node: circleci/node@5.1.0

jobs:
  test-api:
    docker:
      - image: cimg/node:20.0
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Run Vitest Tests
          command: npm run test

  build-and-deploy:
    docker:
      - image: cimg/node:20.0
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Build
          command: npm run build
      - run:
          name: Deploy
          command: |
            echo "Executando deploy do código compilado..."
            echo "Arquivos prontos para deploy no workspace:"
            ls -R dist/

workflows:
  api-workflow:
    jobs:
      - test-api
      - build-and-deploy:
          requires:
            - test-api
          filters:
            branches:
              only:
                - production
